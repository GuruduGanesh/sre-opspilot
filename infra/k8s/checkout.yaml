apiVersion: apps/v1
kind: Deployment
metadata:
  name: checkout
  namespace: opspilot-demo
  labels:
    app.kubernetes.io/name: checkout
    app.kubernetes.io/part-of: opspilot
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: checkout
  template:
    metadata:
      labels:
        app.kubernetes.io/name: checkout
        app.kubernetes.io/part-of: opspilot
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: checkout
          image: opspilot-checkout:0.1
          imagePullPolicy: Never
          ports:
            - name: http
              containerPort: 8000
          env:
            - name: FAIL_MODE
              value: "false"
            - name: MEMORY_LEAK_MODE
              value: "false"
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 2
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 4
---
apiVersion: v1
kind: Service
metadata:
  name: checkout
  namespace: opspilot-demo
  labels:
    app.kubernetes.io/name: checkout
spec:
  selector:
    app.kubernetes.io/name: checkout
  ports:
    - name: http
      port: 8000
      targetPort: http
