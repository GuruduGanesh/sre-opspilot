apiVersion: apps/v1
kind: Deployment
metadata:
  name: load-generator
  namespace: opspilot-demo
  labels:
    app.kubernetes.io/name: load-generator
    app.kubernetes.io/part-of: opspilot
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: load-generator
  template:
    metadata:
      labels:
        app.kubernetes.io/name: load-generator
        app.kubernetes.io/part-of: opspilot
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: load-generator
          image: busybox:1.37.0
          command:
            - sh
            - -c
            - |
              while true; do
                # A checkout rollout can invalidate one in-flight Service
                # connection. Bound each probe so the generator reconnects to
                # the replacement pod instead of leaving demo telemetry idle.
                wget -T 1 -q -O /dev/null http://checkout:8000/checkout || true
                sleep 0.05
              done
          resources:
            requests:
              cpu: 25m
              memory: 16Mi
            limits:
              cpu: 100m
              memory: 32Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
